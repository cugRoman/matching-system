server:
  port: 8080

spring:
  application:
    name: matching-system
  datasource:
    # 通过本地 SSH 隧道连接远程 MySQL 的 matching_engine 库
    url: jdbc:mysql://127.0.0.1:33060/matching_engine?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: tunnel_user
    password: tunnel_user
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
