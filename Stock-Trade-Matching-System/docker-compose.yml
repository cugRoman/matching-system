# 开发环境依赖服务
# 使用方式: docker-compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: stocktrade-postgres
    environment:
      POSTGRES_DB: stocktrade
      POSTGRES_USER: stocktrade
      POSTGRES_PASSWORD: stocktrade
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: stocktrade-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
