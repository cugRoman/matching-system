server:
  port: 8080

spring:
  application:
    name: matching-system

  # Jackson 配置
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  # 数据库配置 (开发环境使用 H2 本地文件数据库)
  datasource:
    url: jdbc:h2:file:./data/stocktrade;MODE=PostgreSQL;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  # Redis 配置 (开发环境可选，暂时禁用)
  data:
    redis:
      host: localhost
      port: 6379

  # 关闭自动配置 Redis (开发阶段不强制要求 Redis)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

# SpringDoc 配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# 日志配置
logging:
  level:
    root: INFO
    com.stocktrade.matchingsystem: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

---
# 生产环境配置
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://localhost:5432/stocktrade
    driver-class-name: org.postgresql.Driver
    username: stocktrade
    password: stocktrade

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

  autoconfigure:
    exclude: []
